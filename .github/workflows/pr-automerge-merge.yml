name: PR Auto Merge (merge commit)
on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-when-labeled:
    if: contains(github.event.pull_request.labels.*.name, 'automerge')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          JIRA_URL: https://lee35460.atlassian.net
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            // 수집
            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              { owner, repo, pull_number: pr.number }
            );
            const subjects = commits.map(c => (c.commit.message||'').split('\n')[0]).filter(Boolean);

            // 이슈 키 & 커밋 타이틀/메시지 생성
            const findKey = s => (s||'').match(/WXT-\d+/i);
            const issue = (findKey(pr.head.ref) || findKey(pr.title) || findKey(subjects.join('\n')) || [''])[0]?.toUpperCase() || '';
            const normalizedTitle = pr.title?.replace(new RegExp(`^${issue}\\s*[:-]\\s*`,'i'),'').trim() || pr.title || 'Update';

            const commit_title = issue ? `feat(${issue}): ${normalizedTitle}` : normalizedTitle;

            const bullets = subjects.length ? subjects.map(s=>`- ${s}`).join('\n') : '- (no commits)';
            const jiraLine = issue && process.env.JIRA_URL
              ? `Jira: ${process.env.JIRA_URL}/browse/${issue}`
              : (issue ? `Jira: ${issue}` : 'Jira: (none)');

            const commit_message = [
              bullets,
              '',
              jiraLine,
              `PR: #${pr.number}`
            ].join('\n');

            // 머지 실행(merge commit 방식)
            await github.rest.pulls.merge({
              owner, repo, pull_number: pr.number,
              merge_method: 'merge',              // ← squash/rebase 아님
              commit_title, commit_message
            });