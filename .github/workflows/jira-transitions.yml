name: Jira Issue Transitions
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled]
  push:
    branches:
      - 'feature/WXT-*'
      - 'feature/*WXT-*'
      - 'hotfix/WXT-*'
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      issue_key:
        description: 'WXT Issue Key (e.g., WXT-58)'
        required: true
        default: 'WXT-58'
      target_status:
        description: 'Target Status'
        required: true
        default: 'In Review'
        type: choice
        options:
          - 'In Review'
          - 'In Test'  
          - 'Done'
          - 'hot fix'

permissions:
  contents: read
  pull-requests: write

jobs:
  # 수동 테스트용 Job
  manual-transition:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Manual Jira Transition
        env:
          JIRA_URL: https://lee35460.atlassian.net
          JIRA_USER: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          WXT_ISSUE="${{ github.event.inputs.issue_key }}"
          TARGET_STATUS="${{ github.event.inputs.target_status }}"
          
          echo "🔄 Manual transition: $WXT_ISSUE → $TARGET_STATUS"
          
          # 현재 상태 확인
          CURRENT_STATUS=$(curl -s -u "$JIRA_USER:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_URL/rest/api/3/issue/$WXT_ISSUE" | \
            jq -r '.fields.status.name // "Unknown"')
          
          echo "Current status: $CURRENT_STATUS"
          
          # 전이 ID 결정
          case "$TARGET_STATUS" in
            "In Review")
              TRANSITION_ID="9"
              ;;
            "In Test")
              TRANSITION_ID="11"
              ;;
            "Done")
              TRANSITION_ID="4"
              ;;
            "hot fix")
              TRANSITION_ID="14"
              ;;
            *)
              echo "❌ Unknown target status: $TARGET_STATUS"
              exit 1
              ;;
          esac
          
          # 전이 실행
          RESPONSE=$(curl -s -w "%{http_code}" -u "$JIRA_USER:$JIRA_TOKEN" \
            -X POST \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "{\"transition\":{\"id\":\"$TRANSITION_ID\"}}" \
            "$JIRA_URL/rest/api/3/issue/$WXT_ISSUE/transitions")
          
          HTTP_CODE="${RESPONSE: -3}"
          
          if [[ "$HTTP_CODE" == "204" ]]; then
            echo "✅ Successfully transitioned $WXT_ISSUE to $TARGET_STATUS"
          else
            echo "❌ Transition failed with HTTP $HTTP_CODE"
            echo "$RESPONSE"
            exit 1
          fi

  # Push 이벤트 시: Feature → In Review, Hotfix → hot fix
  push-to-review:
    if: github.event_name == 'push' && contains(github.ref, 'WXT-')
    runs-on: ubuntu-latest
    steps:
      - name: Extract WXT Issue Key from Push
        id: extract-issue
        run: |
          # 브랜치에서 WXT 키 추출
          BRANCH_NAME="${{ github.ref_name }}"
          echo "🔍 Push to branch: $BRANCH_NAME"
          echo "🔍 Event name: ${{ github.event_name }}"
          
          WXT_ISSUE=$(echo "$BRANCH_NAME" | grep -oE 'WXT-[0-9]+' | head -1)
          echo "issue_key=$WXT_ISSUE" >> $GITHUB_OUTPUT
          echo "✅ Found WXT issue from push: $WXT_ISSUE"

      - name: Branch-specific Transition (Push)
        if: steps.extract-issue.outputs.issue_key != ''
        env:
          JIRA_URL: https://lee35460.atlassian.net
          JIRA_USER: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          WXT_ISSUE="${{ steps.extract-issue.outputs.issue_key }}"
          BRANCH_NAME="${{ github.ref_name }}"
          
          # Jira 이슈 상태 확인
          CURRENT_STATUS=$(curl -s -u "$JIRA_USER:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_URL/rest/api/3/issue/$WXT_ISSUE" | \
            jq -r '.fields.status.name // "Unknown"')
          
          echo "Current status: $CURRENT_STATUS"
          
          # 브랜치 타입에 따른 전이 결정
          if [[ "$BRANCH_NAME" =~ ^hotfix/WXT- ]]; then
            # Hotfix 브랜치: Done → hot fix (전이 ID: 14)
            echo "🔄 Hotfix Push - Transitioning $WXT_ISSUE: Done → hot fix"
            EXPECTED_STATUS="Done"
            TRANSITION_ID="14"
            TARGET_STATUS="hot fix"
          else
            # Feature 브랜치: In Progress → In Review (전이 ID: 9)
            echo "🔄 Feature Push - Transitioning $WXT_ISSUE: In Progress → In Review"
            EXPECTED_STATUS="In Progress"
            TRANSITION_ID="9"
            TARGET_STATUS="In Review"
          fi
          
          if [[ "$CURRENT_STATUS" == "$EXPECTED_STATUS" ]]; then
            RESPONSE=$(curl -s -w "%{http_code}" -u "$JIRA_USER:$JIRA_TOKEN" \
              -X POST \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"$TRANSITION_ID\"}}" \
              "$JIRA_URL/rest/api/3/issue/$WXT_ISSUE/transitions")
            
            HTTP_CODE="${RESPONSE: -3}"
            
            if [[ "$HTTP_CODE" == "204" ]]; then
              echo "✅ Transitioned $WXT_ISSUE from $EXPECTED_STATUS to $TARGET_STATUS"
            else
              echo "❌ Transition failed with HTTP $HTTP_CODE"
              echo "${RESPONSE%???}"
            fi
          else
            echo "ℹ️ Issue $WXT_ISSUE is in '$CURRENT_STATUS' status, expected '$EXPECTED_STATUS'"
          fi

  # PR 생성/업데이트 시: In Review → In Test
  pr-to-test:
    if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'ready_for_review')
    runs-on: ubuntu-latest
    steps:
      - name: Extract WXT Issue Key from PR
        id: extract-issue
        run: |
          # PR 브랜치에서 WXT 키 추출
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          echo "🔍 PR Branch name: $BRANCH_NAME"
          echo "🔍 Event name: ${{ github.event_name }}"
          echo "🔍 Event action: ${{ github.event.action }}"
          
          WXT_ISSUE=$(echo "$BRANCH_NAME" | grep -oE 'WXT-[0-9]+' | head -1)
          echo "issue_key=$WXT_ISSUE" >> $GITHUB_OUTPUT
          echo "✅ Found WXT issue from PR: $WXT_ISSUE"

      - name: Transition to In Test (PR Created)
        if: steps.extract-issue.outputs.issue_key != ''
        env:
          JIRA_URL: https://lee35460.atlassian.net
          JIRA_USER: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          WXT_ISSUE="${{ steps.extract-issue.outputs.issue_key }}"
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          
          # Jira 이슈 상태 확인
          CURRENT_STATUS=$(curl -s -u "$JIRA_USER:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_URL/rest/api/3/issue/$WXT_ISSUE" | \
            jq -r '.fields.status.name // "Unknown"')
          
          echo "Current status: $CURRENT_STATUS"
          
          # 브랜치 타입에 따른 전이 결정
          if [[ "$BRANCH_NAME" =~ ^hotfix/WXT- ]]; then
            # Hotfix PR: hot fix → In Test (전이 ID: 16)
            echo "🔄 Hotfix PR Created - Transitioning $WXT_ISSUE: hot fix → In Test"
            EXPECTED_STATUS="hot fix"
            TRANSITION_ID="16"
          else
            # Feature PR: In Review → In Test (전이 ID: 11)
            echo "🔄 Feature PR Created - Transitioning $WXT_ISSUE: In Review → In Test"
            EXPECTED_STATUS="In Review" 
            TRANSITION_ID="11"
          fi
          
          if [[ "$CURRENT_STATUS" == "$EXPECTED_STATUS" ]]; then
            RESPONSE=$(curl -s -w "%{http_code}" -u "$JIRA_USER:$JIRA_TOKEN" \
              -X POST \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"$TRANSITION_ID\"}}" \
              "$JIRA_URL/rest/api/3/issue/$WXT_ISSUE/transitions")
            
            HTTP_CODE="${RESPONSE: -3}"
            
            if [[ "$HTTP_CODE" == "204" ]]; then
              echo "✅ Transitioned $WXT_ISSUE to In Test"
            else
              echo "❌ Transition failed with HTTP $HTTP_CODE"
              echo "${RESPONSE%???}"
            fi
          else
            echo "ℹ️ Issue $WXT_ISSUE is in '$CURRENT_STATUS' status, expected '$EXPECTED_STATUS'"
          fi



  # PR 머지 시: In Test → Done
  transition-to-done:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Extract WXT Issue Key
        id: extract-issue
        run: |
          # PR 브랜치에서 WXT 키 추출
          BRANCH_NAME="${{ github.head_ref }}"
          WXT_ISSUE=$(echo "$BRANCH_NAME" | grep -oE 'WXT-[0-9]+' | head -1)
          echo "issue_key=$WXT_ISSUE" >> $GITHUB_OUTPUT
          echo "Found WXT issue: $WXT_ISSUE"

      - name: Auto Merge PR
        uses: actions/github-script@v7
        env:
          JIRA_URL: https://lee35460.atlassian.net
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            // PR 머지 실행
            await github.rest.pulls.merge({
              owner, repo, pull_number: pr.number,
              merge_method: 'merge',
              commit_title: `feat(${{ steps.extract-issue.outputs.issue_key }}): ${pr.title}`,
              commit_message: `Merged PR #${pr.number}\n\nJira: ${process.env.JIRA_URL}/browse/${{ steps.extract-issue.outputs.issue_key }}`
            });

      - name: Transition to Done
        if: steps.extract-issue.outputs.issue_key != ''
        env:
          JIRA_URL: https://lee35460.atlassian.net
          JIRA_USER: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          WXT_ISSUE="${{ steps.extract-issue.outputs.issue_key }}"
          echo "🔄 Transitioning $WXT_ISSUE: In Test → Done"
          
          # Jira 이슈 상태 확인
          CURRENT_STATUS=$(curl -s -u "$JIRA_USER:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_URL/rest/api/3/issue/$WXT_ISSUE" | \
            jq -r '.fields.status.name // "Unknown"')
          
          echo "Current status: $CURRENT_STATUS"
          
          # In Test → Done 전이 (전이 ID: 4)
          if [[ "$CURRENT_STATUS" == "In Test" ]]; then
            curl -s -u "$JIRA_USER:$JIRA_TOKEN" \
              -X POST \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -d '{"transition":{"id":"4"}}' \
              "$JIRA_URL/rest/api/3/issue/$WXT_ISSUE/transitions"
            echo "✅ Transitioned $WXT_ISSUE to Done"
          else
            echo "⚠️ Issue $WXT_ISSUE is not in 'In Test' status, skipping transition"
          fi