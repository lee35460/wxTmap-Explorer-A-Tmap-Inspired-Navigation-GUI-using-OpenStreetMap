name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: Build & Test
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      BUILD_TYPE: Release
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install \
            wxwidgets \
            nlohmann-json \
            spdlog \
            fmt \
            googletest \
            ccache \
            ninja

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libwxgtk3.2-dev \
            libwxgtk-webview3.2-dev \
            nlohmann-json3-dev \
            libspdlog-dev \
            libfmt-dev \
            libgtest-dev \
            xvfb
          sudo cmake -S /usr/src/googletest -B /usr/src/googletest/build
          sudo cmake --build /usr/src/googletest/build --target install

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y ninja
          git clone https://github.com/microsoft/vcpkg.git $env:USERPROFILE\vcpkg
          & $env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat
          & $env:USERPROFILE\vcpkg\vcpkg.exe install wxwidgets:x64-windows nlohmann-json:x64-windows spdlog:x64-windows fmt:x64-windows gtest:x64-windows
          $toolchain = "$env:USERPROFILE\vcpkg\scripts\buildsystems\vcpkg.cmake"
          $env:CMAKE_TOOLCHAIN_FILE = $toolchain
          "CMAKE_TOOLCHAIN_FILE=$toolchain" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_TARGET_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S app -B app/build -G Ninja \
                   -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
                   -DBUILD_TESTING=ON \
                   -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Configure (Ubuntu)
        if: runner.os == 'Linux'
        run: cmake -S app -B app/build -G Ninja \
                   -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
                   -DBUILD_TESTING=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -S app -B app/build -G Ninja -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE -DBUILD_TESTING=ON "-DCMAKE_TOOLCHAIN_FILE=$env:CMAKE_TOOLCHAIN_FILE"

      - name: Build
        if: runner.os != 'Windows'
        run: cmake --build app/build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build app/build --parallel --config $env:BUILD_TYPE

      - name: Test
        if: runner.os != 'Windows'
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a ctest --test-dir app/build --output-on-failure
          else
            ctest --test-dir app/build --output-on-failure
          fi

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ctest --test-dir app/build --output-on-failure -C $env:BUILD_TYPE