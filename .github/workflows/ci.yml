name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: Build & Test (self-hosted macOS ARM64)
    runs-on: [self-hosted, macos, arm64, wxt]
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (macOS ARM64)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install \
            wxwidgets \
            nlohmann-json \
            spdlog \
            fmt \
            googletest \
            ccache

      - name: Configure
        run: cmake -S app -B app/build \
                   -DCMAKE_BUILD_TYPE=Debug \
                   -DBUILD_TESTING=ON \
                   -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build
        run: cmake --build app/build -- -j$(sysctl -n hw.ncpu)

      - name: Test
        run: ctest --test-dir app/build -C Debug --output-on-failure