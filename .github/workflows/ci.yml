name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: Build & Test (self-hosted macOS ARM64)
    runs-on: [self-hosted, macos, arm64, wxt]   # ← self-hosted 등록할 때 입력한 라벨과 일치시켜야 함
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (macOS ARM64)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install \
            wxwidgets \
            nlohmann-json \
            spdlog \
            fmt \
            googletest \
            ccache

      - name: Configure
        run: cmake -S app -B app/build \
                   -DCMAKE_BUILD_TYPE=Debug \
                   -DBUILD_TESTING=ON \
                   -DCMAKE_OSX_ARCHITECTURES=arm64   # ← Apple Silicon 강제

      - name: Build
        run: cmake --build app/build -- -j$(sysctl -n hw.ncpu)

      - name: Test
        if: runner.os != 'Windows'
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a --server-args="-screen 0 1920x1080x24" env GDK_BACKEND=x11 ctest --test-dir app/build --output-on-failure
          else
            ctest --test-dir app/build --output-on-failure
          fi

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ctest --test-dir app/build --output-on-failure -C $env:BUILD_TYPE