# .github/workflows/ci.yml
name: CI
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: Build & Test (self-hosted macOS ARM64)
    runs-on: [self-hosted, macos, arm64, wxt]   # ← self-hosted 등록할 때 입력한 라벨과 일치시켜야 함
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (macOS ARM64)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install \
            wxwidgets \
            nlohmann-json \
            spdlog \
            fmt \
            googletest \
            ccache

      - name: Configure
        run: cmake -S app -B app/build \
                   -DCMAKE_BUILD_TYPE=Debug \
                   -DBUILD_TESTING=ON \
                   -DCMAKE_OSX_ARCHITECTURES=arm64   # ← Apple Silicon 강제

      - name: Build
        run: cmake --build app/build -- -j$(sysctl -n hw.ncpu)

      - name: Test
        run: ctest --test-dir app/build --output-on-failure