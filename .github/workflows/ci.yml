name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  build-test-macos-arm64:
    runs-on: macos-14   # Apple Silicon (ARM64) 러너
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Homebrew)
        run: |
          brew update
          brew install wxwidgets nlohmann-json spdlog fmt googletest ccache

      - name: Configure (CMake)
        run: |
          cmake -S app -B app/build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build app/build -- -j

      - name: Run tests
        run: |
          ctest --test-dir app/build --output-on-failure

      - name: Upload test artifacts (metrics csv if exists)
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: |
            app/build/*.csv
            app/build/**/*.csv
          if-no-files-found: ignore