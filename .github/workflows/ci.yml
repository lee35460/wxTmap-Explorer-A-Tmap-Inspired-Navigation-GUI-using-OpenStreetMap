name: Jira Transitions
permissions:
  contents: read
  pull-requests: read
on:
  pull_request:
  workflow_dispatch:

jobs:
  pr_opened_review_or_merged_test:
    name: PR opened, review or merged test
    runs-on: [self-hosted, macos, arm64, wxt]
    steps:
      - name: Collect Jira keys from PR (title + branch)
        env:
          TITLE: ${{ github.event.pull_request.title }}
          BODY: ${{ github.event.pull_request.body }}
          BRANCH: ${{ github.head_ref }}
        run: |
          KEYS_FROM_TITLE=$(scripts/jira_transition.sh find-from-text "$TITLE" || true)
          KEYS_FROM_BODY=$(scripts/jira_transition.sh find-from-text "$BODY" || true)
          KEYS_FROM_BRANCH=$(scripts/jira_transition.sh find-from-branch "$BRANCH" || true)
          KEYS="$(printf "%s\n%s\n%s\n" "$KEYS_FROM_TITLE" "$KEYS_FROM_BODY" "$KEYS_FROM_BRANCH" | sort -u | tr '\n' ',' | sed 's/,$//')"
          echo "keys=$KEYS" >> $GITHUB_OUTPUT
          echo "Found keys: $KEYS"

  hotfix_push_mark_from_done:
    name: Hotfix push mark from done
    runs-on: [self-hosted, macos, arm64, wxt]
    steps:
      # steps here

  ci_pass_to_done:
    name: CI pass to done
    runs-on: [self-hosted, macos, arm64, wxt]
    steps:
      - id: collect
        name: Infer keys from head branch of the PR that triggered CI
        run: |
          BRANCH='${{ github.event.workflow_run.head_branch }}'
          KEYS=$(scripts/jira_transition.sh find-from-branch "$BRANCH" || true)
          KEYS="$(echo "$KEYS" | tr '\n' ',' | sed 's/,$//')"
          echo "keys=$KEYS" >> $GITHUB_OUTPUT
          echo "From CI run branch($BRANCH), keys: $KEYS"


name: CI
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: Build & Test (self-hosted macOS ARM64)
    runs-on: [self-hosted, macos, arm64, wxt]   # ← self-hosted 등록할 때 입력한 라벨과 일치시켜야 함
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (macOS ARM64)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install \
            wxwidgets \
            nlohmann-json \
            spdlog \
            fmt \
            googletest \
            ccache

      - name: Configure
        run: cmake -S app -B app/build \
                   -DCMAKE_BUILD_TYPE=Debug \
                   -DBUILD_TESTING=ON \
                   -DCMAKE_OSX_ARCHITECTURES=arm64   # ← Apple Silicon 강제

      - name: Build
        run: cmake --build app/build -- -j$(sysctl -n hw.ncpu)

      - name: Test
        run: ctest --test-dir app/build -C Debug --output-on-failure
#!/usr/bin/env bash
set -euo pipefail

# Required envs must be provided via GitHub Secrets or runner env
: "${JIRA_BASE_URL:?JIRA_BASE_URL is required}"
: "${JIRA_USER_EMAIL:?JIRA_USER_EMAIL is required}"
: "${JIRA_API_TOKEN:?JIRA_API_TOKEN is required}"

jira_get_transition_id() {
  local key="$1" name="$2"
  curl -sS -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
    -H "Accept: application/json" \
    "$JIRA_BASE_URL/rest/api/3/issue/$key/transitions" \
  | jq -r --arg name "$name" '.transitions[] | select(.name==$name) | .id' || true
}

jira_transition() {
  local key="$1" name="$2"
  local tid
  tid="$(jira_get_transition_id "$key" "$name")"
  if [[ -z "${tid:-}" || "$tid" == "null" ]]; then
    echo "WARN: No transition named '$name' for $key (skipping)"
    return 0
  fi

  curl -sS -X POST \
    -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
    -H "Content-Type: application/json" \
    --data "{\"transition\": {\"id\": \"$tid\"}}" \
    "$JIRA_BASE_URL/rest/api/3/issue/$key/transitions" \
    >/dev/null

  echo "OK: $key -> $name (id=$tid)"
}

# Extract issue keys (WXT-123), case-insensitive
extract_keys() {
  local text="${1:-}"
  [[ -z "$text" ]] && return 0
  echo "$text" | grep -Eoi 'WXT-[0-9]+' | awk '{print toupper($0)}' | sort -u
}

run_for_keys() {
  local keys_csv="${1:-}" to="${2:-}"
  if [[ -z "$keys_csv" || -z "$to" ]]; then
    echo "ERR: keys or transition name missing" >&2
    exit 1
  fi
  IFS=',' read -ra KEYS <<< "$keys_csv"
  for k in "${KEYS[@]}"; do
    [[ -z "$k" ]] && continue
    jira_transition "$k" "$to"
  done
}

case "${1:-}" in
  find-from-branch)
    extract_keys "${2:-}"
    ;;
  find-from-text)
    extract_keys "${2:-}"
    ;;
  do)
    run_for_keys "${2:-}" "${3:-}"
    ;;
  *)
    echo "Usage:"
    echo "  $0 find-from-branch <branch_name>"
    echo "  $0 find-from-text <text>"
    echo "  $0 do <KEY1,KEY2,...> <Transition Name>"
    exit 1
    ;;
fi